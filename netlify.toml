# Netlify configuration for VibeThread (static site)
# Publish directory: site/
# No build command needed — pure HTML/CSS/JS

[build]
  publish = "site"

# ── Security headers (mirrors server.js) ──────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com https://cdnjs.cloudflare.com https://cdn.c360a.salesforce.com; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://fonts.googleapis.com; font-src 'self' https://cdnjs.cloudflare.com https://fonts.gstatic.com; img-src 'self' data: blob: https://images.unsplash.com; connect-src 'self' https://*.salesforce.com https://*.c360a.salesforce.com https://*.evergage.com; frame-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# Cache static assets aggressively, HTML never
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/Assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── Redirects ──────────────────────────────────────────────────────────────────
# Root → index
[[redirects]]
  from = "/"
  to   = "/index.html"
  status = 200

# 404 fallback
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 404
